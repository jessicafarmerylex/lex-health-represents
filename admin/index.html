<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lexington Health Media Hub CMS</title>

    <script type="module">
      import { AuthError, MissingIdentityError, handleAuthCallback } from 'https://esm.sh/@netlify/identity@1.2.0'

      try {
        await handleAuthCallback()
      } catch (error) {
        if (error instanceof MissingIdentityError || error instanceof AuthError) {
          console.warn(error.message)
        } else {
          throw error
        }
      }
    </script>
  </head>
  <body>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  </body>
</html>
